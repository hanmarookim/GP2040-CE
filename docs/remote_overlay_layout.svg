<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="860" viewBox="0 0 1400 860">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#1f2937"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <style>
      .title { font: 700 34px 'Segoe UI', sans-serif; fill: #f9fafb; }
      .subtitle { font: 500 18px 'Segoe UI', sans-serif; fill: #d1d5db; }
      .label { font: 700 22px 'Segoe UI', sans-serif; fill: #f9fafb; text-anchor: middle; dominant-baseline: middle; }
      .small { font: 600 16px 'Segoe UI', sans-serif; fill: #e5e7eb; text-anchor: middle; dominant-baseline: middle; }
      .hint { font: 600 14px 'Segoe UI', sans-serif; fill: #cbd5e1; text-anchor: middle; dominant-baseline: middle; }
      .zone { fill: rgba(255,255,255,0.03); stroke: rgba(255,255,255,0.08); stroke-width: 2; stroke-dasharray: 8 10; }
      .panel { fill: rgba(255,255,255,0.06); stroke: rgba(255,255,255,0.12); stroke-width: 2; }
      .button { filter: url(#shadow); }
      .sys { fill: #475569; stroke: #94a3b8; stroke-width: 3; }
      .shoulder { fill: #0f766e; stroke: #5eead4; stroke-width: 3; }
      .stick { fill: #1d4ed8; stroke: #93c5fd; stroke-width: 4; }
      .dpad { fill: #334155; stroke: #cbd5e1; stroke-width: 3; }
      .faceA { fill: #16a34a; stroke: #86efac; stroke-width: 4; }
      .faceB { fill: #dc2626; stroke: #fca5a5; stroke-width: 4; }
      .faceX { fill: #2563eb; stroke: #93c5fd; stroke-width: 4; }
      .faceY { fill: #ca8a04; stroke: #fde68a; stroke-width: 4; }
      .home { fill: #7c3aed; stroke: #c4b5fd; stroke-width: 4; }
      .outline { fill: none; stroke: rgba(255,255,255,0.18); stroke-width: 3; rx: 24; }
    </style>
  </defs>

  <rect width="1400" height="860" fill="url(#bg)"/>

  <text x="80" y="72" class="title">Switch Remote Overlay Layout</text>
  <text x="80" y="104" class="subtitle">Moonlight touch overlay reference • Nintendo ABXY swap enabled • HOME mapped to Back + Start</text>

  <rect x="54" y="138" width="1292" height="666" rx="28" class="outline"/>

  <rect x="100" y="230" width="330" height="470" rx="34" class="zone"/>
  <text x="265" y="266" class="subtitle" text-anchor="middle">Left Thumb Zone</text>

  <rect x="960" y="230" width="290" height="470" rx="34" class="zone"/>
  <text x="1105" y="266" class="subtitle" text-anchor="middle">Right Thumb Zone</text>

  <rect x="530" y="680" width="340" height="84" rx="22" class="panel"/>
  <text x="700" y="712" class="subtitle" text-anchor="middle">System Buttons</text>
  <text x="700" y="738" class="hint">Keep centered and small so they stay easy to find but do not block the screen</text>

  <g class="button">
    <rect x="118" y="152" width="120" height="56" rx="18" class="shoulder"/>
    <text x="178" y="180" class="label">ZL</text>
  </g>
  <g class="button">
    <rect x="252" y="152" width="120" height="56" rx="18" class="shoulder"/>
    <text x="312" y="180" class="label">L</text>
  </g>
  <g class="button">
    <rect x="1028" y="152" width="120" height="56" rx="18" class="shoulder"/>
    <text x="1088" y="180" class="label">R</text>
  </g>
  <g class="button">
    <rect x="1162" y="152" width="120" height="56" rx="18" class="shoulder"/>
    <text x="1222" y="180" class="label">ZR</text>
  </g>

  <g class="button">
    <circle cx="266" cy="458" r="110" class="stick"/>
    <circle cx="266" cy="458" r="46" fill="#93c5fd" opacity="0.35"/>
    <text x="266" y="452" class="label">LS</text>
    <text x="266" y="486" class="hint">Primary movement</text>
  </g>

  <g class="button">
    <circle cx="1062" cy="410" r="52" class="faceX"/>
    <text x="1062" y="410" class="label">X</text>
  </g>
  <g class="button">
    <circle cx="994" cy="478" r="52" class="faceY"/>
    <text x="994" y="478" class="label">Y</text>
  </g>
  <g class="button">
    <circle cx="1130" cy="478" r="58" class="faceA"/>
    <text x="1130" y="478" class="label">A</text>
  </g>
  <g class="button">
    <circle cx="1062" cy="548" r="58" class="faceB"/>
    <text x="1062" y="548" class="label">B</text>
  </g>
  <text x="1105" y="620" class="subtitle" text-anchor="middle">ABXY should be the largest tap targets</text>

  <g class="button">
    <circle cx="1016" cy="680" r="58" class="stick"/>
    <circle cx="1016" cy="680" r="24" fill="#93c5fd" opacity="0.35"/>
    <text x="1016" y="676" class="small">RS</text>
  </g>
  <text x="1016" y="738" class="hint">Small and lower priority</text>

  <g transform="translate(160 560)" class="button">
    <circle cx="90" cy="90" r="28" class="dpad"/>
    <rect x="66" y="8" width="48" height="164" rx="18" class="dpad"/>
    <rect x="8" y="66" width="164" height="48" rx="18" class="dpad"/>
    <text x="90" y="90" class="small">D</text>
    <text x="90" y="-24" class="subtitle" text-anchor="middle">Optional D-pad</text>
  </g>

  <g class="button">
    <rect x="570" y="700" width="88" height="44" rx="16" class="sys"/>
    <text x="614" y="722" class="small">Back</text>
  </g>
  <g class="button">
    <rect x="674" y="692" width="156" height="60" rx="20" class="home"/>
    <text x="752" y="712" class="small">HOME</text>
    <text x="752" y="734" class="hint">(Back + Start)</text>
  </g>
  <g class="button">
    <rect x="846" y="700" width="88" height="44" rx="16" class="sys"/>
    <text x="890" y="722" class="small">Start</text>
  </g>

  <text x="700" y="816" class="subtitle" text-anchor="middle">Recommended balance: big LS + big ABXY, small RS, centered system buttons, minimal screen coverage</text>
</svg>
